# Team-wide default preset (v4 — 12-scope round).
# Edits are changes to the team contract — open a PR.
#
# Promoted from `preset_v4_12scope.yaml` so the legacy single-preset path
# (`webapp.PRESET_PATH`) and any tooling that defaults to `preset.yaml`
# now operate on the full 12-scope contract.
#
# Scope layout (12 trials):
#   trial_1  : SFP, NIC rail 0, sfp_port_0
#   trial_2  : SFP, NIC rail 0, sfp_port_1
#   trial_3  : SFP, NIC rail 1, sfp_port_0
#   trial_4  : SFP, NIC rail 1, sfp_port_1
#   trial_5  : SFP, NIC rail 2, sfp_port_0
#   trial_6  : SFP, NIC rail 2, sfp_port_1
#   trial_7  : SFP, NIC rail 3, sfp_port_0
#   trial_8  : SFP, NIC rail 3, sfp_port_1
#   trial_9  : SFP, NIC rail 4, sfp_port_0
#   trial_10 : SFP, NIC rail 4, sfp_port_1
#   trial_11 : SC,  SC  rail 0, sc_port_0
#   trial_12 : SC,  SC  rail 1, sc_port_1
#
# Distribution (1800 ep total, 150 per scope, 1 trial per member ID):
#   - M1  전유진 → trial_1  (SFP rail 0 / sfp_port_0)  × 150
#   - M2  전유진 → trial_2  (SFP rail 0 / sfp_port_1)  × 150
#   - M3  이진형 → trial_3  (SFP rail 1 / sfp_port_0)  × 150
#   - M4  이진형 → trial_4  (SFP rail 1 / sfp_port_1)  × 150
#   - M5  정혜린 → trial_5  (SFP rail 2 / sfp_port_0)  × 150
#   - M6  정혜린 → trial_6  (SFP rail 2 / sfp_port_1)  × 150
#   - M7  엄창용 → trial_7  (SFP rail 3 / sfp_port_0)  × 150
#   - M8  엄창용 → trial_8  (SFP rail 3 / sfp_port_1)  × 150
#   - M9  이강인 → trial_9  (SFP rail 4 / sfp_port_0)  × 150
#   - M10 이강인 → trial_10 (SFP rail 4 / sfp_port_1)  × 150
#   - M11 한준모 → trial_11 (SC  rail 0 / sc_port_0)   × 150
#   - M12 한준모 → trial_12 (SC  rail 1 / sc_port_1)   × 150
#
# One member ID per trial means the team UI lists 12 selectable rows so an
# operator picks the exact scope they're starting (rail × port). The same
# physical person owns two consecutive IDs (e.g. 전유진 = M1 + M2) so they
# stay on a fixed scene layout for their whole shift (only the port flips
# between IDs), keeping USD reload time low. 한준모 still owns both SC
# rails (M11 + M12) — SC is the smaller half so dedicating one machine
# avoids loading SC alongside SFP scenes on a multi-task collector.
#
# Score gate stays at 94 (see docs/team-1800-round.md). The split-by-task
# variants (`preset_v4_sfp.yaml`, `preset_v4_sc.yaml`) remain available for
# operations that want SFP and SC ledgers fully decoupled; they share this
# file's contract but each carry their own preset_hash.

version: 4
team:
  base_seed: 43
  shard_stride: 100000
  index_width: 6
sampling:
  strategy: lhs
  ranges:
    nic_translation: [-0.0215, 0.0234]
    nic_yaw: [-0.1745, 0.1745]
    sc_translation: [-0.06, 0.055]
    gripper_xy: 0.002
    gripper_z: 0.002
    gripper_rpy: 0.04
scene:
  nic_count_range: [1, 1]
  sc_count_range: [1, 1]
  target_cycling: true
tasks:
  sfp_default_count: 0
  sc_default_count: 0
trials:
  trial_1:
    task_type: sfp
    fixed_target: {rail: 0, port: sfp_port_0}
  trial_2:
    task_type: sfp
    fixed_target: {rail: 0, port: sfp_port_1}
  trial_3:
    task_type: sfp
    fixed_target: {rail: 1, port: sfp_port_0}
  trial_4:
    task_type: sfp
    fixed_target: {rail: 1, port: sfp_port_1}
  trial_5:
    task_type: sfp
    fixed_target: {rail: 2, port: sfp_port_0}
  trial_6:
    task_type: sfp
    fixed_target: {rail: 2, port: sfp_port_1}
  trial_7:
    task_type: sfp
    fixed_target: {rail: 3, port: sfp_port_0}
  trial_8:
    task_type: sfp
    fixed_target: {rail: 3, port: sfp_port_1}
  trial_9:
    task_type: sfp
    fixed_target: {rail: 4, port: sfp_port_0}
  trial_10:
    task_type: sfp
    fixed_target: {rail: 4, port: sfp_port_1}
  trial_11:
    task_type: sc
    fixed_target: {rail: 0, port: sc_port_0}
  trial_12:
    task_type: sc
    fixed_target: {rail: 1, port: sc_port_1}
members:
  - id: M1
    name: 전유진
    assignment: {trial: trial_1, count: 150}
  - id: M2
    name: 전유진
    assignment: {trial: trial_2, count: 150}
  - id: M3
    name: 이진형
    assignment: {trial: trial_3, count: 150}
  - id: M4
    name: 이진형
    assignment: {trial: trial_4, count: 150}
  - id: M5
    name: 정혜린
    assignment: {trial: trial_5, count: 150}
  - id: M6
    name: 정혜린
    assignment: {trial: trial_6, count: 150}
  - id: M7
    name: 엄창용
    assignment: {trial: trial_7, count: 150}
  - id: M8
    name: 엄창용
    assignment: {trial: trial_8, count: 150}
  - id: M9
    name: 이강인
    assignment: {trial: trial_9, count: 150}
  - id: M10
    name: 이강인
    assignment: {trial: trial_10, count: 150}
  - id: M11
    name: 한준모
    assignment: {trial: trial_11, count: 150}
  - id: M12
    name: 한준모
    assignment: {trial: trial_12, count: 150}
  # ---------------------------------------------------------------------
  # Supplement round (M13 + M14): 576 ep top-up to reach 200 ep / scope.
  # Both IDs owned by 한준모 (continuity with M11 + M12). Split 3 : 7
  # across 11 trials (trial_9 already at 200 -> excluded from both lists).
  # Each ID enqueues all 11 trial assignments at once when selected in
  # the team UI. shard_stride keeps configs disjoint from M1..M12, so
  # base_seed stays at 43.
  # M13 total = 173, M14 total = 403, grand total = 576.
  # ---------------------------------------------------------------------
  - id: M13
    name: 한준모
    assignments:
      - {trial: trial_1,  count: 15}
      - {trial: trial_2,  count: 15}
      - {trial: trial_3,  count: 18}
      - {trial: trial_4,  count: 30}
      - {trial: trial_5,  count:  2}
      - {trial: trial_6,  count: 15}
      - {trial: trial_7,  count: 15}
      - {trial: trial_8,  count: 15}
      - {trial: trial_10, count: 16}
      - {trial: trial_11, count: 17}
      - {trial: trial_12, count: 15}
  - id: M14
    name: 한준모
    assignments:
      - {trial: trial_1,  count: 35}
      - {trial: trial_2,  count: 35}
      - {trial: trial_3,  count: 42}
      - {trial: trial_4,  count: 70}
      - {trial: trial_5,  count:  5}
      - {trial: trial_6,  count: 35}
      - {trial: trial_7,  count: 35}
      - {trial: trial_8,  count: 35}
      - {trial: trial_10, count: 36}
      - {trial: trial_11, count: 40}
      - {trial: trial_12, count: 35}
