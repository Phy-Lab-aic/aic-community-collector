# Team-wide preset for the 12-scope round (v4).
# Edits are changes to the team contract — open a PR.
#
# Motivation: the v3 1800-round locked every member to a single (rail, port)
# fixed target per trial, so the resulting dataset only covered 3 of the 12
# task scopes the collector schema supports. v4 spreads the round across all
# 12 scopes (10 SFP × 5 rails × 2 ports + 2 SC × 2 rails) so every active
# (rail, port) combination is represented.
#
# Scope layout (12 trials):
#   trial_1  : SFP, NIC rail 0, sfp_port_0   (== v3 trial_1)
#   trial_2  : SFP, NIC rail 0, sfp_port_1
#   trial_3  : SFP, NIC rail 1, sfp_port_0   (== v3 trial_2)
#   trial_4  : SFP, NIC rail 1, sfp_port_1
#   trial_5  : SFP, NIC rail 2, sfp_port_0
#   trial_6  : SFP, NIC rail 2, sfp_port_1
#   trial_7  : SFP, NIC rail 3, sfp_port_0
#   trial_8  : SFP, NIC rail 3, sfp_port_1
#   trial_9  : SFP, NIC rail 4, sfp_port_0
#   trial_10 : SFP, NIC rail 4, sfp_port_1
#   trial_11 : SC,  SC  rail 0, sc_port_0
#   trial_12 : SC,  SC  rail 1, sc_port_1   (== v3 trial_3)
#
# Distribution (option B — 1800 ep total, 150 per scope, 300 per member):
#   - M0 한준모: trial_11 + trial_12          (SC owner; 150 + 150 = 300)
#   - M1 전유진: trial_1  + trial_2           (SFP rail 0; 150 + 150 = 300)
#   - M2 이진형: trial_3  + trial_4           (SFP rail 1; 150 + 150 = 300)
#   - M3 정혜린: trial_5  + trial_6           (SFP rail 2; 150 + 150 = 300)
#   - M4 엄창용: trial_7  + trial_8           (SFP rail 3; 150 + 150 = 300)
#   - M5 이강인: trial_9  + trial_10          (SFP rail 4; 150 + 150 = 300)
#   Total: 1800 (= 12 trials × 150 ep = 6 members × 300 ep).
#
# Why one rail per member: keeps the collector machine on a fixed scene
# layout for the whole shift (only the port flips between trials), which
# cuts USD reload time and lets each member tune to one rail's quirks.
# M0 owns both SC rails because SC is the smaller half (300 ep) and keeps
# the asymmetry from v3 where M0 was the sole SC owner.
#
# Score gate: trial total < 94 -> requeued via `aic-collector` reconcile-score
# + requeue-low-score (see docs/team-1800-round.md). Threshold stays at 94 —
# raise it after we've confirmed v4 mean scores match v3's distribution.

version: 4
team:
  base_seed: 43
  shard_stride: 100000
  index_width: 6
sampling:
  strategy: lhs
  ranges:
    nic_translation: [-0.0215, 0.0234]
    nic_yaw: [-0.1745, 0.1745]
    sc_translation: [-0.06, 0.055]
    gripper_xy: 0.002
    gripper_z: 0.002
    gripper_rpy: 0.04
scene:
  nic_count_range: [1, 1]
  sc_count_range: [1, 1]
  target_cycling: true
tasks:
  sfp_default_count: 0
  sc_default_count: 0
trials:
  trial_1:
    task_type: sfp
    fixed_target: {rail: 0, port: sfp_port_0}
  trial_2:
    task_type: sfp
    fixed_target: {rail: 0, port: sfp_port_1}
  trial_3:
    task_type: sfp
    fixed_target: {rail: 1, port: sfp_port_0}
  trial_4:
    task_type: sfp
    fixed_target: {rail: 1, port: sfp_port_1}
  trial_5:
    task_type: sfp
    fixed_target: {rail: 2, port: sfp_port_0}
  trial_6:
    task_type: sfp
    fixed_target: {rail: 2, port: sfp_port_1}
  trial_7:
    task_type: sfp
    fixed_target: {rail: 3, port: sfp_port_0}
  trial_8:
    task_type: sfp
    fixed_target: {rail: 3, port: sfp_port_1}
  trial_9:
    task_type: sfp
    fixed_target: {rail: 4, port: sfp_port_0}
  trial_10:
    task_type: sfp
    fixed_target: {rail: 4, port: sfp_port_1}
  trial_11:
    task_type: sc
    fixed_target: {rail: 0, port: sc_port_0}
  trial_12:
    task_type: sc
    fixed_target: {rail: 1, port: sc_port_1}
members:
  - id: M0
    name: 한준모
    assignments:
      - {trial: trial_11, count: 150}
      - {trial: trial_12, count: 150}
  - id: M1
    name: 전유진
    assignments:
      - {trial: trial_1, count: 150}
      - {trial: trial_2, count: 150}
  - id: M2
    name: 이진형
    assignments:
      - {trial: trial_3, count: 150}
      - {trial: trial_4, count: 150}
  - id: M3
    name: 정혜린
    assignments:
      - {trial: trial_5, count: 150}
      - {trial: trial_6, count: 150}
  - id: M4
    name: 엄창용
    assignments:
      - {trial: trial_7, count: 150}
      - {trial: trial_8, count: 150}
  - id: M5
    name: 이강인
    assignments:
      - {trial: trial_9, count: 150}
      - {trial: trial_10, count: 150}
